; proxy relation using the data from cluster number counts.
mass_distribution_mu0 = 2.0 2.0 10.0
mass_distribution_mu1 = 0.5 0.8 2.0
mass_distribution_mu2 = -2.0 0.1 2.0
mass_distribution_sigma0 = 0.1 0.3 2.0
mass_distribution_sigma1 = -0.6 0.01 0.3
mass_distribution_sigma2 = -0.5 0.03 2.0
completeness_a_n = 1.1321
completeness_b_n = 0.7751
completeness_a_logm_piv = 13.31
completeness_b_logm_piv = 0.2025
purity_a_n = 1.98298628209
