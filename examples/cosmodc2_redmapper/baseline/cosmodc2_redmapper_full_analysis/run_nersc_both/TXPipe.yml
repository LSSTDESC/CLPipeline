id: TXPipe
site:
    name: cori-batch
    image: ghcr.io/lsstdesc/txpipe-dev
launcher:
    name: mini
    interval: 0.5
modules: >
    txpipe
    txpipe.extensions
    rail.estimation.algos.bpz_lite
python_paths: []
stages:
  - name: TXSourceSelectorMetadetect
    nprocess: 30
  - name: BPZliteInformer
    nprocess: 1
    aliases:
        input: spectroscopic_catalog
        model: photoz_model
  - name: BPZliteEstimator
    nprocess: 30
    aliases:
        model: photoz_model
        input: shear_catalog
        output: source_photoz_pdfs
  - name: CLClusterBinningRedshiftRichness
    nprocess: 1
  - name: CLClusterShearCatalogs
    nprocess: 30   #>1 does not work with mpi
  - name: CLClusterEnsembleProfiles
    nprocess: 10
  - name: CLClusterSACC
    nprocess: 1
    aliases:
        cluster_profiles: cluster_profiles
output_dir: /global/cfs/projectdirs/lsst/groups/CL/cl_pipeline_project/TXPipe_data/outputs-full-2026/
log_dir: ./logs_both
config: ./config_nersc_both.yml
inputs:
    # See README for paths to download these files
    shear_catalog: /global/cfs/projectdirs/lsst/groups/CL/cl_pipeline_project/TXPipe_data/cosmodc2DIR/shear_catalog.hdf5
    #photometry_catalog:  /sps/lsst/users/mricci/TXPipe_data/data_link/cosmodc2/20deg2/photometry_catalog.hdf5
    fiducial_cosmology: /global/cfs/projectdirs/lsst/groups/CL/cl_pipeline_project/TXPipe_data/../fiducial_cosmology.yml
    calibration_table: 
        /global/cfs/projectdirs/lsst/groups/CL/cl_pipeline_project/TXPipe_data/cosmodc2DIR/sample_cosmodc2_w10year_errors.dat
    spectroscopic_catalog: /global/cfs/projectdirs/lsst/groups/CL/cl_pipeline_project/TXPipe_data/cosmodc2DIR/spectroscopic_catalog.hdf5
    cluster_catalog: /global/cfs/projectdirs/lsst/groups/CL/cl_pipeline_project/TXPipe_data/cosmodc2DIR/cluster_catalog.hdf5
    #shear_tomography_catalog: ./data/example/outputs_metadetect/shear_tomography_catalog.hdf5
    #source_photoz_pdfs: ./data/example/inputs/photoz_pdfs.hdf5
resume: true
pipeline_log: ./logs_both/log_both.txt
