id: Firecrown
modules: clpipeline
launcher:
    name: mini
    interval: 0.5
site:
    name: local
    max_threads: 4
stages:
  - name: FirecrownPipeline
    module_name: clpipeline.firecrown_pipeline
    nprocess: 1
inputs:
    clusters_sacc_file_cov: ./outputs_cosmo/clusters_sacc_file_cov.sacc
config: ./config_in2p3_cosmo.yml
resume: false
output_dir: ./outputs_cosmo
log_dir: ./logs_cosmo
