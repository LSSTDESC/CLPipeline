---
id: Firecrown
modules: clpipeline
launcher:
    name: mini
    interval: 0.5
site:
    name: local
    max_threads: 4
stages:
    - name: FirecrownPipeline
      module_name: clpipeline.firecrown_pipeline
      nprocess: 1
inputs:
    clusters_sacc_file_cov: $OUTPUTDIR/clusters_sacc_file_cov.sacc
config: $CONFIG_FILE
resume: False
output_dir: $OUTPUTDIR
log_dir: $LOGDIR

---
id: TJPCov
modules: clpipeline
launcher:
    name: mini
    interval: 0.5
site:
    name: local
    max_threads: 4
stages:
    - name: TJPCovPipeline
      module_name: clpipeline.tjpcov_pipeline
      nprocess: 1
inputs:
    clusters_sacc_file: $TXPIPE_OUTPUTDIR/cluster_sacc_catalog.sacc
config: $CONFIG_FILE
resume: False
output_dir: $OUTPUTDIR
log_dir: $LOGDIR

---
id: TXPipe
site:
   name: cori-batch
   image: ghcr.io/lsstdesc/txpipe-dev
launcher:
    name: mini
    interval: 0.5
modules: >
    txpipe
    txpipe.extensions
    rail.estimation.algos.bpz_lite
python_paths: []
stages:
  - name: TXSourceSelectorMetadetect
    nprocess: 30
  - name: BPZliteInformer
    nprocess: 1
    aliases:
        input: spectroscopic_catalog
        model: photoz_model
  - name: BPZliteEstimator
    nprocess: 30
    aliases:
        model: photoz_model
        input: shear_catalog
        output: source_photoz_pdfs
  - name: CLClusterBinningRedshiftRichness
    nprocess: 1
  - name: CLClusterShearCatalogs
    nprocess: 30   #>1 does not work with mpi
  - name: CLClusterEnsembleProfiles
    nprocess: 10
  - name: CLClusterSACC
    nprocess: 1
    aliases:
        cluster_profiles: cluster_profiles
output_dir: $TXPIPE_OUTPUTDIR
log_dir: $LOGDIR
config: $CONFIG_FILE
inputs:
    # See README for paths to download these files
    shear_catalog: $TXPIPE_DATADIR/$DATADIR/shear_catalog.hdf5
    #photometry_catalog:  /sps/lsst/users/mricci/TXPipe_data/data_link/cosmodc2/20deg2/photometry_catalog.hdf5
    fiducial_cosmology: $TXPIPE_DATADIR/../fiducial_cosmology.yml
    calibration_table: $TXPIPE_DATADIR/$DATADIR/sample_cosmodc2_w10year_errors.dat
    spectroscopic_catalog: $TXPIPE_DATADIR/$DATADIR/spectroscopic_catalog.hdf5
    cluster_catalog: $TXPIPE_DATADIR/$DATADIR/cluster_catalog.hdf5
    #shear_tomography_catalog: ./data/example/outputs_metadetect/shear_tomography_catalog.hdf5
    #source_photoz_pdfs: ./data/example/inputs/photoz_pdfs.hdf5
resume: true
pipeline_log: $LOGDIR/log_$RUNIDENTIFIER.txt
